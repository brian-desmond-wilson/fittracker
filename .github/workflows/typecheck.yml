name: Typecheck (mobile)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (regression gate)
        run: |
          # The app carries known type debt. This gate blocks only NEW errors:
          # it fails when the count rises above mobile/.tsc-baseline. When you
          # burn errors down, lower the baseline to lock in the win.
          BASELINE=$(cat .tsc-baseline)
          OUTPUT=$(npx tsc --noEmit 2>&1 || true)
          COUNT=$(echo "$OUTPUT" | grep -c "error TS" || true)
          echo "Baseline: $BASELINE   Current: $COUNT"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::TypeScript errors increased from $BASELINE to $COUNT"
            echo "$OUTPUT" | grep "error TS" || true
            exit 1
          fi
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::warning::Errors dropped to $COUNT — update mobile/.tsc-baseline to $COUNT to lock in the gain."
          fi
